<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatur AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── AUTH GUARD (runs before anything renders) ────────── -->
  <script>
    if (!localStorage.getItem('nm_api_key')) {
      window.location.replace('login.html');
    }
  </script>

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside id="sidebar">

    <div class="sidebar-header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="logo-text">Cha<span>tur</span></span>
    </div>

    <button class="new-chat-btn" id="new-chat-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5"  y1="12" x2="19" y2="12"/>
      </svg>
      New conversation
    </button>

    <div class="sessions-list" id="sessions-list"></div>

    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar-text">T</div>
      <span class="user-name" id="user-name-label">User</span>
      <button id="logout-btn" title="Sign out"
        style="margin-left:auto;background:none;border:none;color:var(--text3);
               padding:4px;border-radius:6px;display:flex;align-items:center;
               transition:color 0.2s,background 0.2s;cursor:pointer;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" style="width:15px;height:15px;">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- server connection indicator -->
    <div id="conn-indicator"
      style="padding:8px 12px 12px;display:flex;align-items:center;gap:6px;
             font-size:11px;color:var(--text3);">
      <div id="conn-dot"
        style="width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;"></div>
      <span id="conn-label">Connecting...</span>
    </div>

  </aside>

  <!-- ── MAIN ────────────────────────────────────────────── -->
  <main id="main">

    <!-- TOPBAR -->
    <div id="topbar">
      <button class="toggle-sidebar-btn" id="toggle-sidebar-btn" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbar-title">New conversation</span>
      <span class="topbar-route-badge" id="route-badge"></span>
    </div>

    <!-- CHAT AREA -->
    <div id="chat-area">
      <div class="chat-inner" id="chat-inner">

        <div class="empty-state" id="empty-state">
          <div class="empty-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="empty-title">Hello, <span id="empty-username">there</span></div>
          <div class="empty-sub">Ask anything, upload a document, send an image, or start a voice conversation.</div>
          <div class="suggestion-pills" id="suggestion-pills">
            <div class="suggestion-pill" data-text="What is the refund policy?">Refund policy</div>
            <div class="suggestion-pill" data-text="What is the weather in Mumbai?">Mumbai weather</div>
            <div class="suggestion-pill" data-text="Calculate 256 * 4">Calculator</div>
            <div class="suggestion-pill" data-text="Tell me about Chatur AI">About Chatur</div>
          </div>
        </div>

      </div>
    </div>

    <!-- INPUT AREA -->
    <div id="input-area">
      <div class="input-wrapper">

        <div id="attachment-row"></div>

        <div class="input-box" id="input-box">
          <textarea id="user-input" placeholder="Message Chatur..." rows="1"></textarea>

          <div class="input-actions">

            <button class="input-btn" id="btn-attach-file" title="Attach document (PDF, DOCX, TXT)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>

            <button class="input-btn" id="btn-attach-image" title="Send image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </button>

            <button class="input-btn" id="btn-voice" title="Voice chat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8"  y1="23" x2="16" y2="23"/>
              </svg>
            </button>

            <div class="input-spacer"></div>

            <button id="send-btn" title="Send message" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>

          </div>
        </div>

        <div class="input-hint">Chatur can make mistakes. Verify important information.</div>
      </div>
    </div>

  </main>

  <!-- Hidden file inputs -->
  <input type="file" id="file-input"  accept=".pdf,.doc,.docx,.txt" multiple/>
  <input type="file" id="image-input" accept="image/*" multiple/>

  <!-- ── VOICE MODAL ──────────────────────────────────────── -->
  <div id="voice-modal" role="dialog" aria-modal="true" aria-label="Voice chat">

    <div class="voice-bars" id="voice-bars">
      <div class="voice-bar" id="bar1"></div>
      <div class="voice-bar" id="bar2"></div>
      <div class="voice-bar" id="bar3"></div>
      <div class="voice-bar" id="bar4"></div>
      <div class="voice-bar" id="bar5"></div>
    </div>

    <div class="voice-status" id="voice-status">Tap mic to <span>speak</span></div>

    <button class="voice-action-btn" id="voice-action-btn">
      <svg id="voice-icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
      <svg id="voice-icon-stop" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>

    <div style="display:flex;align-items:center;gap:16px;margin-top:4px;">
      <button class="voice-cancel-btn" id="voice-cancel-btn">Cancel</button>
      <button id="loop-toggle-btn" title="Enable continuous loop"
        style="background:none;border:1px solid rgba(255,255,255,0.12);
               color:var(--text3);font-size:12px;padding:5px 12px;
               border-radius:20px;cursor:pointer;transition:all 0.2s;
               font-family:var(--font-body);">
        🔁 Loop
      </button>
    </div>
    <style>
      #loop-toggle-btn.active {
        background: rgba(124,106,247,0.15);
        border-color: rgba(124,106,247,0.5);
        color: var(--accent);
      }
    </style>

  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
